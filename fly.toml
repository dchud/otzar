app = "otzar"
primary_region = "iad"

[build]

[env]
  PORT = "8000"
  DATA_DIR = "/data"
  DEBUG = "false"

[mounts]
  source = "appdata"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.health]
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"
      method = "GET"
      path = "/health/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
