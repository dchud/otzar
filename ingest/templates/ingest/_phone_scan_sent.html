<div class="p-4 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg text-center"
     id="phone-scan-result">
  <p class="text-green-800 dark:text-green-200 font-medium">
    Sent ISBN {{ isbn }} to review
  </p>
  <p class="text-sm text-green-700 dark:text-green-300 mt-1">
    {{ count }} candidate{{ count|pluralize }} found. Check your laptop.
  </p>
  <p class="text-xs text-gray-500 dark:text-gray-400 mt-3">
    Ready to scan another book.
  </p>
</div>
