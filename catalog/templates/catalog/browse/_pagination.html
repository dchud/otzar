{% if page_obj.has_other_pages %}
<nav aria-label="Pagination" class="mt-8 flex items-center justify-between border-t border-gray-200 dark:border-gray-700 pt-4">
  <div>
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}"
       class="inline-flex items-center gap-1 text-sm font-medium text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300">
      &larr; Previous
    </a>
    {% endif %}
  </div>
  <span class="text-sm text-gray-500 dark:text-gray-400">
    Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
  </span>
  <div>
    {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}"
       class="inline-flex items-center gap-1 text-sm font-medium text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300">
      Next &rarr;
    </a>
    {% endif %}
  </div>
</nav>
{% endif %}
